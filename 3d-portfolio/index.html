<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bdvs.me — World Cup Jerseys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,700;0,900;1,900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-counter">
      <span id="nav-num">01</span><span class="nav-sep">/</span><span>15</span>
    </div>
  </nav>

  <!-- PROFILE CARD -->
  <div class="profile-card" id="profile-card">
    <div class="profile-card-top">
      <img class="profile-card-av" src="images/avatar.jpg" alt="Bertrand Deveseleer" />
      <div class="profile-card-info">
        <p class="profile-card-name">Bertrand Deveseleer</p>
        <p class="profile-card-role">Brand Guardian @lemlist</p>
      </div>
    </div>
    <div class="profile-divider"></div>
    <div class="profile-socials">
      <a href="https://bdvs.me" class="social-link" target="_blank" rel="noopener" aria-label="Website">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </a>
      <a href="https://www.linkedin.com/in/bdvsme/" class="social-link" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
      <a href="https://www.instagram.com/bdvs.me/" class="social-link" target="_blank" rel="noopener" aria-label="Instagram">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
      <a href="https://dribbble.com/BertrandDvs" class="social-link" target="_blank" rel="noopener" aria-label="Dribbble">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>
      </a>
    </div>
  </div>

  <!-- CAROUSEL -->
  <div class="stage">
    <div class="carousel" id="carousel"></div>

    <div class="dots" id="dots"></div>
  </div>

  <div id="cursor-glow"></div>
  <div class="kb-hint">
    <kbd class="kb-key kb-key-l">←</kbd>
    <kbd class="kb-key kb-key-r">→</kbd>
  </div>

  <div class="wc-countdown" id="wc-countdown">
    <span class="wc-label">⚽ World Cup 2026</span>
    <div class="wc-timer">
      <div class="wc-unit"><span id="wc-d">--</span><em>days</em></div>
      <div class="wc-sep">:</div>
      <div class="wc-unit"><span id="wc-h">--</span><em>hrs</em></div>
      <div class="wc-sep">:</div>
      <div class="wc-unit"><span id="wc-m">--</span><em>min</em></div>
      <div class="wc-sep">:</div>
      <div class="wc-unit"><span id="wc-s">--</span><em>sec</em></div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="panel" id="panel" role="dialog" aria-modal="true" aria-label="Team details">
    <button class="panel-close" id="panel-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="panel-inner">
      <div class="panel-left">
        <div class="panel-glow" id="panel-glow"></div>
        <img src="" alt="" id="panel-img" />
      </div>
      <div class="panel-right" id="panel-right"></div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
